syntax = "proto3";

package groupsapp;

service AuthService {
  rpc Register (RegisterRequest) returns (AuthResponse);
  rpc Login (LoginRequest) returns (AuthResponse);
}

service GroupService {
  rpc CreateGroup (CreateGroupRequest) returns (GroupResponse);
  rpc JoinGroup (JoinGroupRequest) returns (GroupResponse);
  rpc ListMyGroups (ListMyGroupsRequest) returns (ListMyGroupsResponse);  // ← NUEVO
}

service MessageService {
  rpc SendMessage (SendMessageRequest) returns (MessageResponse);
  rpc GetMessages (GetMessagesRequest) returns (MessagesResponse);
}

service DiscoveryService {
  rpc RegisterP2P (RegisterP2PRequest) returns (RegisterP2PResponse);
  rpc GetGroupOnlinePeers (GetGroupPeersRequest) returns (GetGroupPeersResponse);
}

service PresenceService {
  rpc UpdatePresence (stream PresenceUpdate) returns (stream PresenceUpdate);
}

message ListMyGroupsRequest {}

message ListMyGroupsResponse {
  repeated GroupInfo groups = 1;
}

message GroupInfo {
  string group_id = 1;
  string group_name = 2;
}


// === Mensajes existentes ===
message RegisterRequest { string username = 1; string password = 2; }
message LoginRequest { string username = 1; string password = 2; }
message AuthResponse { string token = 1; string message = 2; }

message CreateGroupRequest { string group_name = 1; string admin_username = 2; }
message JoinGroupRequest { string group_id = 1; string username = 2; }
message GroupResponse { string group_id = 1; string message = 2; }

message SendMessageRequest { string group_id = 1; string sender = 2; string content = 3; }
message GetMessagesRequest { string group_id = 1; }
message MessageResponse { string message_id = 1; string message = 2; string timestamp = 3; }
message MessagesResponse { repeated MessageResponse messages = 1; }

message PresenceUpdate {
  string username = 1;
  bool online = 2;
  string group_id = 3;
}

// === NUEVOS PARA P2P (SIGNALLING) ===
message RegisterP2PRequest {
  string username = 1;
  int32 p2p_port = 2;
  string ip = 3;           // el peer envía su IP pública o "0.0.0.0"
}

message RegisterP2PResponse {
  bool success = 1;
  string message = 2;
}

message GetGroupPeersRequest {
  string group_id = 1;
}

message GetGroupPeersResponse {
  repeated PeerInfo peers = 1;
}

message PeerInfo {
  string username = 1;
  string ip = 2;
  int32 p2p_port = 3;
}